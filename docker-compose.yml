services:
  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shorteneradmin}
      POSTGRES_DB: ${POSTGRES_DB:-shortener}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
